<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali's CRM</title>
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>📊 Kali's CRM</h1>
                <span class="subtitle">GNB Global + SaltHaus</span>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" onclick="showQuickAdd()">+ Quick Add</button>
                <button class="btn btn-secondary" onclick="showAddModal()">+ New Lead</button>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat">
                <span class="stat-value" id="totalLeads">0</span>
                <span class="stat-label">Total Leads</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="pipelineValue">$0</span>
                <span class="stat-label">Pipeline Value</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="wonValue">$0</span>
                <span class="stat-label">Won</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="recentActivity">0</span>
                <span class="stat-label">Activities (7d)</span>
            </div>
            <div class="stat filter-stat">
                <select id="businessFilter" onchange="loadLeads()">
                    <option value="">All Businesses</option>
                    <option value="gnb">GNB Global</option>
                    <option value="salthaus">SaltHaus</option>
                </select>
            </div>
        </div>

        <!-- Pipeline View -->
        <div class="pipeline" id="pipeline">
            <!-- Stages rendered by JS -->
        </div>

        <!-- Recent Activity -->
        <div class="activity-section">
            <h2>Recent Activity</h2>
            <div class="activity-list" id="activityList">
                <!-- Activities loaded by JS -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Lead Modal -->
    <div class="modal" id="leadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Lead</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="leadForm" onsubmit="saveLead(event)">
                <input type="hidden" id="leadId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="leadName" required>
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="leadCompany">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="leadEmail">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="leadPhone">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Source</label>
                        <input type="text" id="leadSource" placeholder="e.g. LinkedIn, Event, Referral">
                    </div>
                    <div class="form-group">
                        <label>Business</label>
                        <select id="leadBusiness">
                            <option value="gnb">GNB Global</option>
                            <option value="salthaus">SaltHaus</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Estimated Value ($)</label>
                        <input type="number" id="leadValue" min="0" step="100">
                    </div>
                    <div class="form-group">
                        <label>Next Follow-up</label>
                        <input type="date" id="leadFollowup">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="leadNotes" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Lead</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lead Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="detailTitle">Lead Details</h2>
                <button class="close-btn" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="detail-content" id="detailContent">
                <!-- Loaded by JS -->
            </div>
        </div>
    </div>

    <!-- Quick Add Modal -->
    <div class="modal" id="quickAddModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Quick Add Lead</h2>
                <button class="close-btn" onclick="closeQuickAdd()">&times;</button>
            </div>
            <form onsubmit="doQuickAdd(event)">
                <div class="form-group">
                    <label>Enter lead info</label>
                    <input type="text" id="quickAddText" 
                           placeholder="e.g. New lead from FTW DAO - John Smith, Acme Corp"
                           autofocus>
                </div>
                <p class="hint">I'll parse the name, company, and source automatically</p>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeQuickAdd()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Lead</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
