<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Analytics - Kali's CRM</title>
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <h1>📊 Analytics</h1>
                <span class="subtitle">Pipeline & Performance</span>
            </div>
            <div class="header-right">
                <a href="/" class="btn btn-secondary">← Back to CRM</a>
            </div>
        </header>

        <!-- Key Metrics -->
        <div class="stats-bar" id="keyMetrics">
            <div class="stat">
                <span class="stat-value" id="totalLeads">0</span>
                <span class="stat-label">Total Leads</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="winRate">0%</span>
                <span class="stat-label">Win Rate</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="pipelineValue">$0</span>
                <span class="stat-label">Pipeline Value</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="wonValue">$0</span>
                <span class="stat-label">Won Revenue</span>
            </div>
        </div>

        <div class="analytics-grid">
            <!-- Pipeline Funnel -->
            <div class="analytics-card">
                <h2>Pipeline Funnel</h2>
                <div class="funnel" id="funnel"></div>
            </div>

            <!-- Source Analysis -->
            <div class="analytics-card">
                <h2>Lead Sources</h2>
                <div class="source-list" id="sourceList"></div>
            </div>

            <!-- Business Split -->
            <div class="analytics-card">
                <h2>Business Split</h2>
                <div class="business-split" id="businessSplit"></div>
            </div>

            <!-- Conversion Rates -->
            <div class="analytics-card">
                <h2>Stage Conversion Rates</h2>
                <div class="conversion-rates" id="conversionRates"></div>
            </div>

            <!-- Activity Summary -->
            <div class="analytics-card full-width">
                <h2>Activity (Last 7 Days)</h2>
                <div class="activity-summary" id="activitySummary"></div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        
        document.addEventListener('DOMContentLoaded', loadAnalytics);
        
        async function api(endpoint) {
            const res = await fetch(`${API}${endpoint}`);
            return res.json();
        }
        
        async function loadAnalytics() {
            const [stats, conversions, sources, business, activity] = await Promise.all([
                api('/stats'),
                api('/analytics/conversions'),
                api('/analytics/sources'),
                api('/analytics/business'),
                api('/analytics/activity')
            ]);
            
            renderKeyMetrics(stats, conversions);
            renderFunnel(conversions);
            renderSources(sources);
            renderBusinessSplit(business);
            renderConversions(conversions);
            renderActivity(activity);
        }
        
        function renderKeyMetrics(stats, conversions) {
            document.getElementById('totalLeads').textContent = stats.total_leads;
            document.getElementById('winRate').textContent = conversions.win_rate + '%';
            document.getElementById('pipelineValue').textContent = '$' + (stats.pipeline_value || 0).toLocaleString();
            document.getElementById('wonValue').textContent = '$' + (stats.won_value || 0).toLocaleString();
        }
        
        function renderFunnel(conversions) {
            const stages = [
                { id: 'new', name: '🆕 New', color: '#3b82f6' },
                { id: 'contacted', name: '📧 Contacted', color: '#8b5cf6' },
                { id: 'qualified', name: '✅ Qualified', color: '#10b981' },
                { id: 'proposal', name: '📄 Proposal', color: '#f59e0b' },
                { id: 'negotiation', name: '🤝 Negotiation', color: '#ef4444' },
                { id: 'won', name: '🎉 Won', color: '#22c55e' }
            ];
            
            const counts = conversions.stage_counts;
            const max = Math.max(...Object.values(counts));
            
            const funnel = document.getElementById('funnel');
            funnel.innerHTML = stages.map(s => {
                const count = counts[s.id] || 0;
                const pct = max > 0 ? (count / max * 100) : 0;
                return `
                    <div class="funnel-stage">
                        <span class="funnel-label">${s.name}</span>
                        <div class="funnel-bar-bg">
                            <div class="funnel-bar" style="width: ${pct}%; background: ${s.color}"></div>
                        </div>
                        <span class="funnel-count">${count}</span>
                    </div>
                `;
            }).join('');
        }
        
        function renderSources(sources) {
            const list = document.getElementById('sourceList');
            if (!sources || sources.length === 0) {
                list.innerHTML = '<p class="empty">No source data yet</p>';
                return;
            }
            
            list.innerHTML = sources.map(s => {
                const winRate = s.count > 0 ? Math.round(s.wins / s.count * 100) : 0;
                return `
                    <div class="source-item">
                        <div class="source-name">${s.source}</div>
                        <div class="source-stats">
                            <span>${s.count} leads</span>
                            <span>${winRate}% wins</span>
                            <span>${s.in_progress} active</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderBusinessSplit(business) {
            const div = document.getElementById('businessSplit');
            div.innerHTML = `
                <div class="business-item">
                    <div class="business-label">GNB Global</div>
                    <div class="business-count">${business.gnb.count} leads</div>
                    <div class="business-value">$${(business.gnb.pipeline_value || 0).toLocaleString()} pipeline</div>
                    <div class="business-won">$${(business.gnb.won_value || 0).toLocaleString()} won</div>
                </div>
                <div class="business-item">
                    <div class="business-label">SaltHaus</div>
                    <div class="business-count">${business.salthaus.count} leads</div>
                    <div class="business-value">$${(business.salthaus.pipeline_value || 0).toLocaleString()} pipeline</div>
                    <div class="business-won">$${(business.salthaus.won_value || 0).toLocaleString()} won</div>
                </div>
            `;
        }
        
        function renderConversions(conversions) {
            const rates = conversions.conversion_rates;
            const div = document.getElementById('conversionRates');
            div.innerHTML = Object.entries(rates).map(([key, value]) => {
                const [from, to] = key.split('_to_');
                return `
                    <div class="conversion-item">
                        <span>${from} → ${to}</span>
                        <span class="conversion-rate">${value}%</span>
                    </div>
                `;
            }).join('');
        }
        
        function renderActivity(activity) {
            const div = document.getElementById('activitySummary');
            div.innerHTML = `
                <div class="activity-total">${activity.total} activities this week</div>
                <div class="activity-types">
                    ${activity.by_type.map(a => `
                        <span class="activity-type">${a.activity_type}: ${a.count}</span>
                    `).join('')}
                </div>
            `;
        }
        
        // Auto-refresh
        setInterval(loadAnalytics, 30000);
    </script>
    
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 24px;
        }
        
        .analytics-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .analytics-card h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--gray-800);
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        /* Funnel */
        .funnel-stage {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .funnel-label {
            width: 100px;
            font-size: 13px;
        }
        
        .funnel-bar-bg {
            flex: 1;
            height: 24px;
            background: var(--gray-100);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .funnel-bar {
            height: 100%;
            transition: width 0.3s;
        }
        
        .funnel-count {
            width: 40px;
            text-align: right;
            font-weight: 600;
            color: var(--gray-700);
        }
        
        /* Sources */
        .source-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .source-item:last-child {
            border-bottom: none;
        }
        
        .source-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .source-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--gray-500);
        }
        
        /* Business Split */
        .business-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .business-item {
            padding: 16px;
            background: var(--gray-50);
            border-radius: 8px;
        }
        
        .business-label {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .business-count {
            font-size: 13px;
            color: var(--gray-600);
        }
        
        .business-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
        }
        
        .business-won {
            font-size: 14px;
            color: var(--success);
            font-weight: 600;
        }
        
        /* Conversions */
        .conversion-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .conversion-rate {
            font-weight: 700;
            color: var(--primary);
        }
        
        /* Activity */
        .activity-total {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .activity-types {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .activity-type {
            background: var(--gray-100);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
        }
        
        .empty {
            color: var(--gray-500);
            text-align: center;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</body>
</html>
